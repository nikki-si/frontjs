<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Воспитатель - Детский сад</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="64x64" href="favicon64x64.png">
</head>
<body>
    <!-- Фон с облачками -->
    <div class="clouds-background">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="header-content">
                <h1>🌸 Кабинет воспитателя</h1>
                <span class="position" id="teacherName">Загрузка...</span>
            </div>
            <button class="btn-logout" onclick="logout()">🚪 Выйти</button>
        </header>

        <!-- Панель управления -->
        <div class="control-panel">
            <div class="control-group">
                <label for="groupSelect">👧 Группа:</label>
                <select id="groupSelect" onchange="changeGroup()">
                    <option value="">Загрузка...</option>
                </select>
            </div>
            <div class="control-group">
                <button class="btn-nav" onclick="changeMonth(-1)">◀</button>
                <span class="month-display" id="monthDisplay">Апрель 2026</span>
                <button class="btn-nav" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="control-group">
                <button class="btn-mass" onclick="markAllPresent()">✅ Все присутствуют</button>
                <button class="btn-mass-absent" onclick="markAllAbsent()">❌ Все отсутствуют</button>
            </div>
        </div>

        <!-- Таблица посещаемости -->
        <div class="table-container">
            <table class="attendance-table">
                <thead>
                    <tr>
                        <th>ФИО ребёнка</th>
                        <!-- Даты добавляются динамически -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Строки добавляются динамически -->
                </tbody>
                <tfoot>
                    <tr class="summary-row">
                        <td><strong>Итого</strong></td>
                        <!-- Итоги добавляются динамически -->
                    </tr>
                </tfoot>
            </table>
        </div>

        <!-- Итоговая информация -->
        <div class="summary-info">
            <div class="summary-card">
                <span class="summary-label">Всего детей</span>
                <span class="summary-value" id="totalChildren">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Присутствуют сегодня</span>
                <span class="summary-value" id="presentToday">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Отсутствуют сегодня</span>
                <span class="summary-value" id="absentToday">0</span>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="api.js"></script>
    <script src="teacher.js"></script>
</body>
</html>
