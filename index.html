<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Детский сад</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="64x64" href="favicon64x64.png">
</head>
<body class="auth-page">
    <div class="clouds-background">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    
    <div class="auth-container">
        <div class="auth-card">
            <!-- Форма регистрации -->
            <div id="registerForm">
               <h1>🌸 Регистрация 🌸</h1> 
                <p class="subtitle">Заполните форму, чтобы отправить заявку</p>
                
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <input type="email" id="regEmail" placeholder="email@domain.com" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="Пароль" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <input type="text" id="regFullName" placeholder="Ваше ФИО" required>
                    </div>
                    
                    <div class="form-group">
                        <select id="regRole" required>
                            <option value="">Выберите роль</option>
                            <option value="TEACHER">👨‍🏫 Воспитатель</option>
                            <option value="ACCOUNTANT">💰 Бухгалтер</option>
                        </select>
                        <small style="color: #718096; display: block; margin-top: 5px;">После регистрации администратор должен подтвердить ваш аккаунт</small>
                    </div>
                    
                    <button type="submit" class="btn-primary">Отправить заявку</button>
                </form>
                
                <div class="auth-footer">
                    <p>Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
                    <p class="copyright">© Все права защищены</p>
                </div>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" style="display: none;">
                <h1>🔐 Вход 🔐</h1>
                <p class="subtitle">Введите ваш email и пароль для входа</p>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="email@domain.com" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Войти</button>
                </form>
                
                <div class="auth-footer">
                    <p>Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
                    <p class="copyright">© Все права защищены</p>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    
    <script>
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? '#48bb78' : type === 'error' ? '#f56565' : '#4299e1'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                z-index: 9999;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const full_name = document.getElementById('regFullName').value.trim();
            let role = document.getElementById('regRole').value;
            
            if (password.length < 6) {
                showNotification('Пароль должен быть не менее 6 символов', 'error');
                return;
            }
            
            if (!role) {
                showNotification('Выберите роль', 'error');
                return;
            }
            
            role = role.toUpperCase();
            
            try {
                const response = await fetch('http://127.0.0.1:8000/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name, role })
                });
                
                if (response.ok) {
                    showNotification('✅ Заявка отправлена! После подтверждения администратором вы сможете войти.', 'success');
                    
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regFullName').value = '';
                    document.getElementById('regRole').value = '';
                    
                    setTimeout(() => showLogin(), 3000);
                } else {
                    const error = await response.json();
                    showNotification(error.detail || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('Ошибка подключения к серверу', 'error');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            try {
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
                
                const response = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    localStorage.setItem('jwt_token', data.access_token);
                    
                    const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                    const role = payload.role?.toLowerCase();
                    
                    localStorage.setItem('userRole', role);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', payload.full_name || email);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    showNotification('Вход выполнен успешно!', 'success');
                    
                    setTimeout(() => {
                        switch(role) {
                            case 'admin':
                                window.location.href = 'admin.html';
                                break;
                            case 'teacher':
                                window.location.href = 'teacher.html';
                                break;
                            case 'accountant':
                                window.location.href = 'accountant.html';
                                break;
                            default:
                                showNotification('Неизвестная роль пользователя', 'error');
                        }
                    }, 500);
                } else {
                    const error = await response.json();
                    showNotification(error.detail || 'Неверный email или пароль', 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('Ошибка подключения к серверу', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('jwt_token');
            const role = localStorage.getItem('userRole');
            
            if (token && role) {
                switch(role) {
                    case 'admin':
                        window.location.href = 'admin.html';
                        break;
                    case 'teacher':
                        window.location.href = 'teacher.html';
                        break;
                    case 'accountant':
                        window.location.href = 'accountant.html';
                        break;
                }
            }
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn { 
                from { transform: translateX(100%); opacity: 0; } 
                to { transform: translateX(0); opacity: 1; } 
            } 
            @keyframes slideOut { 
                from { transform: translateX(0); opacity: 1; } 
                to { transform: translateX(100%); opacity: 0; } 
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
